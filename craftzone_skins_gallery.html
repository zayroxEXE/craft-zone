
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#4CAF50;--dark-green:#2E7D32;--bg:#111;--card:#1e1e1e;
  --border:#2a2a2a;--text:#e0e0e0;--muted:#777;--accent:#7CFC00;--gold:#FFD700;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}

nav{
  background:#0a0a0a;border-bottom:2px solid var(--green);
  padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;
}
.logo{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent)}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:1.5rem}
.nav-links a{color:var(--muted);text-decoration:none;font-size:12px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}

.hero{
  background:#0d150d;border-bottom:1px solid #1a1a1a;
  padding:2.5rem 1.5rem;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 31px,#152015 31px,#152015 32px),
    repeating-linear-gradient(90deg,transparent,transparent 31px,#152015 31px,#152015 32px);
  opacity:.5;
}
.hero-inner{position:relative;z-index:1}
.hero h1{font-family:'Press Start 2P',monospace;font-size:18px;color:#fff;margin-bottom:.8rem;line-height:1.7}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--muted);font-size:13px;margin-bottom:1.5rem}

.filters{
  display:flex;gap:.5rem;padding:1.2rem 1.5rem;
  background:#0a0a0a;border-bottom:1px solid var(--border);
  flex-wrap:wrap;align-items:center;
}
.filters-label{font-size:11px;color:var(--muted);margin-right:.5rem;white-space:nowrap}
.tag{
  padding:.35rem .9rem;border-radius:3px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid #333;background:transparent;color:var(--muted);transition:all .2s;
}
.tag.active,.tag:hover{background:var(--green);color:#fff;border-color:var(--green)}
.search{
  margin-left:auto;padding:.4rem .9rem;background:#1a1a1a;
  border:1px solid #333;border-radius:3px;color:var(--text);font-size:12px;width:160px;
}
.search::placeholder{color:var(--muted)}
.search:focus{outline:none;border-color:var(--green)}

.main{padding:1.5rem;max-width:1100px;margin:0 auto}
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.count{font-size:12px;color:var(--muted)}
.count span{color:var(--accent);font-weight:600}
.sort-select{
  background:#1a1a1a;border:1px solid #333;color:var(--text);
  font-size:12px;padding:.35rem .7rem;border-radius:3px;cursor:pointer;
}
.sort-select:focus{outline:none;border-color:var(--green)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;
  position:relative;
}
.card:hover{transform:translateY(-4px);border-color:var(--green)}

.card-preview{
  height:150px;display:flex;align-items:center;justify-content:center;
  background:#161616;position:relative;overflow:hidden;
}
.card-preview::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 15px,#1a1a1a 15px,#1a1a1a 16px),
    repeating-linear-gradient(90deg,transparent,transparent 15px,#1a1a1a 15px,#1a1a1a 16px);
  opacity:.4;
}
.skin-img{
  width:80px;height:80px;image-rendering:pixelated;
  position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
}
.skin-emoji{font-size:52px;position:relative;z-index:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}

.badge{
  position:absolute;top:.5rem;left:.5rem;z-index:2;
  padding:.2rem .5rem;border-radius:3px;font-size:9px;font-weight:700;
}
.b-hot{background:#FF5722;color:#fff}
.b-new{background:#4CAF50;color:#fff}
.b-rare{background:#FFD700;color:#111}

.like-btn{
  position:absolute;top:.5rem;right:.5rem;z-index:2;
  background:rgba(0,0,0,.6);border:1px solid #333;border-radius:3px;
  padding:.3rem .5rem;cursor:pointer;font-size:12px;color:var(--muted);
  transition:all .2s;
}
.like-btn:hover,.like-btn.liked{color:#FF5252;border-color:#FF5252}

.card-body{padding:.9rem}
.card-name{font-weight:600;font-size:13px;color:#fff;margin-bottom:.3rem}
.card-cat{font-size:10px;color:var(--accent);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.5px}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-dl{font-size:10px;color:var(--muted)}
.card-dl span{color:var(--text)}
.dl-btn{
  padding:.3rem .7rem;background:var(--green);color:#fff;
  border:none;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;transition:background .2s;
}
.dl-btn:hover{background:var(--dark-green)}

.upload-zone{
  border:2px dashed #333;border-radius:8px;padding:2rem;text-align:center;
  margin-bottom:1.5rem;cursor:pointer;transition:border-color .2s;
}
.upload-zone:hover{border-color:var(--green)}
.upload-zone p{font-size:13px;color:var(--muted);margin-top:.5rem}
.upload-zone .icon{font-size:32px}

.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:#1a1a1a;border:1px solid #333;border-radius:8px;
  padding:1.5rem;width:320px;max-width:90vw;
}
.modal h3{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);margin-bottom:1.2rem}
.modal-preview{
  height:120px;background:#111;border-radius:4px;
  display:flex;align-items:center;justify-content:center;margin-bottom:1rem;
}
.modal-skin{font-size:64px}
.modal-name{font-size:18px;font-weight:600;color:#fff;margin-bottom:.3rem}
.modal-cat{font-size:11px;color:var(--accent);margin-bottom:.8rem}
.modal-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.modal-stats{display:flex;gap:1.5rem;margin-bottom:1.2rem}
.modal-stat{text-align:center}
.modal-stat-n{font-size:16px;font-weight:600;color:#fff}
.modal-stat-l{font-size:10px;color:var(--muted)}
.modal-btns{display:flex;gap:.7rem}
.modal-dl{flex:1;padding:.7rem;background:var(--green);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer}
.modal-dl:hover{background:var(--dark-green)}
.modal-close{padding:.7rem 1rem;background:transparent;color:var(--muted);border:1px solid #333;border-radius:4px;font-size:12px;cursor:pointer}
.modal-close:hover{color:#fff;border-color:#555}
</style>

<nav>
  <div class="logo">Craft<span>Zone</span> · <span style="color:var(--muted);font-size:10px">Skins</span></div>
  <div class="nav-links">
    <a href="#" class="active">Skins</a>
    <a href="#">Forum</a>
    <a href="#">Ajouter un skin</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>Galerie de <span>Skins</span> 🎨</h1>
    <p>Télécharge des skins uniques créés par la communauté</p>
  </div>
</div>

<div class="filters">
  <span class="filters-label">Catégorie :</span>
  <button class="tag active" data-cat="tous">Tous</button>
  <button class="tag" data-cat="Fantasy">Fantasy</button>
  <button class="tag" data-cat="Animaux">Animaux</button>
  <button class="tag" data-cat="Héros">Héros</button>
  <button class="tag" data-cat="Pixel Art">Pixel Art</button>
  <button class="tag" data-cat="Meme">Meme</button>
  <input class="search" type="text" placeholder="🔍 Rechercher..." id="search">
</div>

<div class="main">
  <div class="sort-row">
    <div class="count">Affichage de <span id="count">5</span> skins</div>
    <select class="sort-select" id="sort">
      <option>Plus téléchargés</option>
      <option>Plus récents</option>
      <option>Plus aimés</option>
    </select>
  </div>

  <div class="upload-zone" id="uploadZone">
    <div class="icon">📤</div>
    <p>Clique ici pour ajouter ton propre skin (.png)</p>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Détails du skin</h3>
    <div class="modal-preview"><div class="modal-skin" id="modal-emoji"></div></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-cat" id="modal-cat"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-n" id="modal-dl"></div><div class="modal-stat-l">Téléchargements</div></div>
      <div class="modal-stat"><div class="modal-stat-n" id="modal-likes"></div><div class="modal-stat-l">Likes</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-dl" id="modal-dl-btn">⬇ Télécharger le skin</button>
      <button class="modal-close" id="modal-close">Fermer</button>
    </div>
  </div>
</div>

<script>
const skins=[
  {id:1,name:'Flat Eric',cat:'Meme',emoji:'🟡',desc:'Le célèbre personnage jaune du clip de Mr. Oizo. Un classique du pixel art Minecraft !',dl:4200,likes:312,badge:'b-hot',badgeText:'🔥 HOT'},
  {id:2,name:'Mage des glaces',cat:'Fantasy',emoji:'🧙',desc:'Robe bleue et bâton de glace scintillant. Parfait pour les serveurs RPG.',dl:3800,likes:241,badge:'b-new',badgeText:'✨ NEW'},
  {id:3,name:'Renard Ninja',cat:'Animaux',emoji:'🦊',desc:'Un renard en tenue de ninja avec katana. Rapide et stylé.',dl:9800,likes:876,badge:'b-hot',badgeText:'🔥 HOT'},
  {id:4,name:'Roi Doré',cat:'Héros',emoji:'🤴',desc:'Armure royale dorée avec cape rouge. Pour les grands bâtisseurs.',dl:2100,likes:198,badge:'b-rare',badgeText:'⭐ RARE'},
  {id:5,name:'Pixel Steve Zombie',cat:'Pixel Art',emoji:'🧟',desc:'Version zombie du Steve original, entièrement refaite en pixel art HD.',dl:5600,likes:430,badge:'b-new',badgeText:'✨ NEW'},
];

let activeTag='tous', searchVal='', likes={};

function renderGrid(){
  const filtered=skins.filter(s=>{
    const matchTag=activeTag==='tous'||s.cat===activeTag;
    const matchSearch=s.name.toLowerCase().includes(searchVal.toLowerCase());
    return matchTag&&matchSearch;
  });
  document.getElementById('count').textContent=filtered.length;
  const g=document.getElementById('grid');
  g.innerHTML=filtered.map(s=>`
    <div class="card" onclick="openModal(${s.id})">
      <div class="card-preview">
        ${s.badge?`<span class="badge ${s.badge}">${s.badgeText}</span>`:''}
        <button class="like-btn ${likes[s.id]?'liked':''}" onclick="toggleLike(event,${s.id})">${likes[s.id]?'❤️':'🤍'}</button>
        <div class="skin-emoji">${s.emoji}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-cat">${s.cat}</div>
        <div class="card-meta">
          <div class="card-dl">⬇ <span>${s.dl.toLocaleString()}</span></div>
          <button class="dl-btn" onclick="event.stopPropagation();downloadSkin(${s.id})">Télécharger</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleLike(e,id){
  e.stopPropagation();
  likes[id]=!likes[id];
  renderGrid();
}

function downloadSkin(id){
  const s=skins.find(x=>x.id===id);
  s.dl++;
  alert(`Téléchargement de "${s.name}" démarré ! (Sur ton vrai site, le fichier .png se téléchargera automatiquement)`);
  renderGrid();
}

function openModal(id){
  const s=skins.find(x=>x.id===id);
  document.getElementById('modal-emoji').textContent=s.emoji;
  document.getElementById('modal-name').textContent=s.name;
  document.getElementById('modal-cat').textContent=s.cat;
  document.getElementById('modal-desc').textContent=s.desc;
  document.getElementById('modal-dl').textContent=s.dl.toLocaleString();
  document.getElementById('modal-likes').textContent=s.likes;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modal-close').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal-dl-btn').onclick=()=>alert('Téléchargement du skin !');
document.getElementById('modal').onclick=function(e){if(e.target===this)this.classList.remove('open')};

document.querySelectorAll('.tag').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeTag=t.dataset.cat;
    renderGrid();
  };
});

document.getElementById('search').oninput=e=>{searchVal=e.target.value;renderGrid()};

document.getElementById('uploadZone').onclick=()=>alert('Sur ton vrai site WordPress, ici les joueurs pourront uploader leur skin !');

renderGrid();
</script>
